name: 'Deploy - <%= serviceName %>'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deploy_tag:
        required: true
        type: string
<% if (artifactSrc && artifactSrc !== 'repo') { -%>
      artifact_tag:
        required: true
        type: string
<% } -%>

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_PROJECT: <%= projectName %>
  SERVICE_NAME: <%= serviceName %>
  JOB: buildByToken/buildWithParameters?job=<%= projectName %>/<%= serviceName %>
  URL: https://cd.io.nrs.gov.bc.ca
  PACKAGE_REPO: ghcr.io/${{ github.repository }}/<%= serviceName %>

jobs:
  deploy-pre-release-build:
    name: Trigger ${{ inputs.environment }} deployment
    if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read
      pull-requests: read
    outputs:
      project_version: ${{ steps.set-build-output.outputs.project_version }}
      build_guid: ${{ steps.set-build-output.outputs.build_guid }}
      build_number: ${{ steps.set-build-output.outputs.build_number }}
      artifact_name: ${{ steps.set-build-output.outputs.artifact_name }}
      artifact_sha256: ${{ steps.set-build-output.outputs.artifact_sha256 }}
      download_url: ${{ steps.set-download-url.outputs.download_url }}
      checkout_ref: ${{ steps.lookup-pr-merge-ref.outputs.checkout_ref }}
<% if (artifactSrc && artifactSrc !== 'repo') { -%>
      deploy_ref: ${{ steps.lookup-pr-merge-ref.outputs.deploy_ref }}
<% } else { -%>
      build_version: ${{ steps.set-build-output.outputs.build_version }}
<% } -%>
    steps:
      - name: Lookup PR Merge Ref
        id: lookup-pr-merge-ref
        run: |
<% if (artifactSrc && artifactSrc !== 'repo') { -%>
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "deploy_ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          elif [[ ${{ github.ref_name != 'main' }} = true ]]; then
<% } else { -%>
          if [[ ${{ github.ref_name != 'main' }} = true ]]; then
<% } -%>
            RESPONSE=$(curl -s "https://api.github.com/repos/<%= gitHubProjectSlug %>/pulls?head=<%= gitHubProjectSlug.split('/')[0] %>:${{ github.ref_name }}&state=open&base=main" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json")
            PULL_REQUEST_NUMBER=$(echo "${RESPONSE}" | jq -r .[0].number)
            RESPONSE=$(curl -s "https://api.github.com/repos/<%= gitHubProjectSlug %>/pulls/$PULL_REQUEST_NUMBER" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json")
            MERGEABLE=$(echo "${RESPONSE}" | jq -r .mergeable)
            if [[ "$MERGEABLE" != "true" ]]; then
              echo "::error ::Pull request #$PULL_REQUEST_NUMBER is not mergeable… aborted."
              echo "This can be resolved by resolving the merge conflict with the main branch."
              exit 1
            fi
<% if (artifactSrc && artifactSrc !== 'repo') { -%>
            echo "deploy_ref=refs/pull/$PULL_REQUEST_NUMBER/merge" >> $GITHUB_OUTPUT
          else
            echo "deploy_ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
<% } else { -%>
            echo "build_sha=$(echo ${RESPONSE} | jq -r .merge_commit_sha)" >> $GITHUB_OUTPUT
            echo "checkout_ref=refs/pull/${PULL_REQUEST_NUMBER}/merge" >> $GITHUB_OUTPUT
          else
            echo "build_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "checkout_ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi
<% } -%>
<% if (artifactSrc && artifactSrc !== 'repo') { %>
          WHERE_QUERY=$(jq -rn \
            --arg serviceProject "$SERVICE_PROJECT" \
            --arg serviceName "$SERVICE_NAME" \
            --arg artifactTag "$ARTIFACT_TAG" \
            '{"actions.action":"package-build","actions.service.project":$serviceProject,"actions.service.name":$serviceName,"actions.package.version":$artifactTag} | @uri')

          RESPONSE=$(curl -s -X 'POST' \
            "${BROKER_URL}/v1/intention/search?where=${WHERE_QUERY}&offset=0&limit=1" \
            -H 'accept: application/json' \
            -H 'Authorization: Bearer '"${BROKER_JWT}"'' \
            -d '')

          if echo "$RESPONSE" | jq -e '.statusCode == 401' > /dev/null; then
            echo "Status code is 401. This indicates an authorization error."
            echo "Please check if your Broker Token is valid. Teams can generate a new one in Broker if needed."
            echo "Link: https://broker.io.nrs.gov.bc.ca/browse/brokerAccount"
            echo "Exiting..."
            exit 1
          fi

          if [ "$(echo "$RESPONSE" | jq '.data | length')" -eq 0 ] || \
             [ "$(echo "$RESPONSE" | jq '.data[].actions[].artifacts | length')" -eq 0 ]; then
            echo
            echo "============================================================"
            echo "Error: Broker API response data is empty."
            echo "------------------------------------------------------------"
            echo "Explanation: No build information was found for this artifact_tag."
            echo "Why it matters: The deployment cannot proceed without build metadata."
            echo "Check if the build completed and published the artifact to Broker."
            echo "--- Broker API response below ---"
            echo "$RESPONSE"
            echo "============================================================"
            echo
            exit 1
          fi

          BUILD_SHA=$(echo "$RESPONSE" | jq -r '.data[].actions[].package.buildVersion' | head -n1)
          if [[ -z "${BUILD_SHA}" || "${BUILD_SHA}" == "null" ]]; then
            echo "::error::Unable to resolve build SHA from Broker response for artifact_tag ${ARTIFACT_TAG}."
            exit 1
          fi

          echo "build_sha=${BUILD_SHA}" >> $GITHUB_OUTPUT
          echo "checkout_ref=${BUILD_SHA}" >> $GITHUB_OUTPUT
          echo "package_tag=${ARTIFACT_TAG}" >> $GITHUB_OUTPUT
<% } -%>
        env:
          BROKER_URL: https://broker.io.nrs.gov.bc.ca
          BROKER_JWT: ${{ secrets.<%= brokerJwt %> }}
          SERVICE_PROJECT: ${{ env.SERVICE_PROJECT }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
<% if (artifactSrc && artifactSrc !== 'repo') { -%>
          ARTIFACT_TAG: ${{ inputs.artifact_tag }}
<% } -%>
      - name: Set build output
        id: set-build-output
        run: |
          WHERE_QUERY=$(jq -rn \
            --arg serviceProject "$SERVICE_PROJECT" \
            --arg serviceName "$SERVICE_NAME" \
            --arg buildSha "$BUILD_SHA" \
            '{"actions.action":"package-build","actions.service.project":$serviceProject,"actions.service.name":$serviceName,"actions.package.buildVersion":$buildSha} | @uri')

          RESPONSE=$(curl -s -X 'POST' \
            "${BROKER_URL}/v1/intention/search?where=${WHERE_QUERY}&offset=0&limit=1" \
            -H 'accept: application/json' \
            -H 'Authorization: Bearer '"${BROKER_JWT}"'' \
            -d '')
          if echo "$RESPONSE" | jq -e '.statusCode == 401' > /dev/null; then
            echo "Status code is 401. This indicates an authorization error."
            echo "Please check if your Broker Token is valid. Teams can generate a new one in Broker if needed."
            echo "Link: https://broker.io.nrs.gov.bc.ca/browse/brokerAccount"
            echo "Exiting..."
            exit 1
          fi
          if [ "$(echo "$RESPONSE" | jq '.data | length')" -eq 0 ] || \
             [ "$(echo "$RESPONSE" | jq '.data[].actions[].artifacts | length')" -eq 0 ]; then
            echo
            echo "============================================================"
            echo "Error: Broker API response data is empty."
            echo "------------------------------------------------------------"
            echo "Explanation: No build information was found for this tag."
            echo "Why it matters: The deployment cannot proceed without build metadata."
            echo "Check if the most recent build completed and published the artifact to Broker."
            echo "--- Broker API response below ---"
            echo "$RESPONSE"
            echo "============================================================"
            echo
            exit 1
          fi
          echo "project_version=$(echo ${RESPONSE} | jq -r '.data[].actions[].package.version')" >> $GITHUB_OUTPUT
          echo "build_guid=$(echo ${RESPONSE} | jq -r '.data[].id')" >> $GITHUB_OUTPUT
          echo "build_number=$(echo ${RESPONSE} | jq -r '.data[].actions[].package.buildNumber')" >> $GITHUB_OUTPUT
<% if (artifactSrc && artifactSrc === 'repo') { -%>
          echo "build_version=$(echo ${RESPONSE} | jq -r '.data[].actions[].package.buildVersion')" >> $GITHUB_OUTPUT
<% } -%>
          echo "artifact_name=$(echo ${RESPONSE} | jq -r '.data[].actions[].artifacts[].name')" >> $GITHUB_OUTPUT
          artifact_checksum=$(echo ${RESPONSE} | jq -r '.data[].actions[].artifacts[].checksum')
          echo "artifact_sha256=${artifact_checksum#sha256:}" >> $GITHUB_OUTPUT
        env:
          BROKER_URL: https://broker.io.nrs.gov.bc.ca
          BROKER_JWT: ${{ secrets.<%= brokerJwt %> }}
          SERVICE_PROJECT: ${{ env.SERVICE_PROJECT }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          BUILD_SHA: ${{ steps.lookup-pr-merge-ref.outputs.build_sha }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0
            fetch-tags: true
            ref: ${{ steps.lookup-pr-merge-ref.outputs.checkout_ref }}
      - name: Set package download URL
        id: set-download-url
        run: |
          DOWNLOAD_URL="${PACKAGE_REPO}:${PACKAGE_TAG}"
          echo "${DOWNLOAD_URL}"
          echo "download_url=$(echo ${DOWNLOAD_URL})" >> $GITHUB_OUTPUT
        env:
          PACKAGE_TAG: ${{ steps.lookup-pr-merge-ref.outputs.package_tag || steps.set-build-output.outputs.project_version }}
          PACKAGE_REPO: ${{ env.PACKAGE_REPO }}
  deploy-release-build:
    name: Trigger deployment
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read
    outputs:
      project_version: ${{ steps.set-tag-output.outputs.project_version }}
      build_guid: ${{ steps.set-tag-output.outputs.build_guid }}
      build_number: ${{ steps.set-tag-output.outputs.build_number }}
      artifact_name: ${{ steps.set-tag-output.outputs.artifact_name }}
      artifact_sha256: ${{ steps.set-tag-output.outputs.artifact_sha256 }}
      download_url: ${{ steps.set-download-url.outputs.download_url }}
      checkout_ref: ${{ steps.set-tag-output.outputs.checkout_ref }}
<% if (artifactSrc && artifactSrc == 'repo') { -%>
      build_version: ${{ steps.set-tag-output.outputs.build_version }}
<% } -%>
    steps:
      - name: Set tag output
        id: set-tag-output
        run: |
<% if (artifactSrc && artifactSrc !== 'repo') { -%>
          TAG=${ARTIFACT_TAG}
          PROJECT_VERSION=${ARTIFACT_TAG}
<% } else { -%>
          TAG=${{ github.ref_name }}
          PROJECT_VERSION=${TAG#v}
<% } -%>
          WHERE_QUERY=$(jq -rn \
            --arg serviceProject "$SERVICE_PROJECT" \
            --arg serviceName "$SERVICE_NAME" \
            --arg projectVersion "$PROJECT_VERSION" \
            '{"actions.action":"package-build","actions.service.project":$serviceProject,"actions.service.name":$serviceName,"actions.package.version":$projectVersion} | @uri')

          RESPONSE=$(curl -s -X 'POST' \
            "${BROKER_URL}/v1/intention/search?where=${WHERE_QUERY}&offset=0&limit=1" \
            -H 'accept: application/json' \
            -H 'Authorization: Bearer '"${BROKER_JWT}"'' \
            -d '')
          if echo "$RESPONSE" | jq -e '.statusCode == 401' > /dev/null; then
            echo "Status code is 401. This indicates an authorization error."
            echo "Please check if your Broker Token is valid. Teams can generate a new one in Broker if needed."
            echo "Link: https://broker.io.nrs.gov.bc.ca/browse/brokerAccount"
            echo "Exiting..."
            exit 1
          fi
          if [ "$(echo "$RESPONSE" | jq '.data | length')" -eq 0 ] || \
             [ "$(echo "$RESPONSE" | jq '.data[].actions[].artifacts | length')" -eq 0 ]; then
            echo
            echo "============================================================"
            echo "Error: Broker API response data is empty."
            echo "------------------------------------------------------------"
            echo "Explanation: No build information was found for this tag."
            echo "Why it matters: The deployment cannot proceed without build metadata."
            echo "Check if the most recent build completed and published the artifact to Broker."
            echo "--- Broker API response below ---"
            echo "$RESPONSE"
            echo "============================================================"
            echo
            exit 1
          fi
          echo "project_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "project_version=${PROJECT_VERSION}" >> $GITHUB_OUTPUT
<% if (artifactSrc && artifactSrc !== 'repo') { -%>
          echo "checkout_ref=$(echo ${RESPONSE} | jq -r '.data[].actions[].package.buildVersion' | head -n1)" >> $GITHUB_OUTPUT
<% } else { -%>
          echo "checkout_ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          echo "build_version=$(echo ${RESPONSE} | jq -r '.data[].actions[].package.buildVersion')" >> $GITHUB_OUTPUT
<% } -%>
          echo "build_guid=$(echo ${RESPONSE} | jq -r '.data[].id')" >> $GITHUB_OUTPUT
          echo "build_number=$(echo ${RESPONSE} | jq -r '.data[].actions[].package.buildNumber')" >> $GITHUB_OUTPUT
          echo "artifact_name=$(echo ${RESPONSE} | jq -r '.data[].actions[].artifacts[].name')" >> $GITHUB_OUTPUT
          artifact_checksum=$(echo ${RESPONSE} | jq -r '.data[].actions[].artifacts[].checksum')
          echo "artifact_sha256=${artifact_checksum#sha256:}" >> $GITHUB_OUTPUT
        env:
          BROKER_URL: https://broker.io.nrs.gov.bc.ca
          BROKER_JWT: ${{ secrets.<%= brokerJwt %> }}
          SERVICE_PROJECT: ${{ env.SERVICE_PROJECT }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
<% if (artifactSrc && artifactSrc !== 'repo') { -%>
          ARTIFACT_TAG: ${{ inputs.artifact_tag }}
<% } -%>
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0
            fetch-tags: true
            ref: ${{ steps.set-tag-output.outputs.checkout_ref || github.ref }}
      - name: Set download URL
        id: set-download-url
        run: |
          DOWNLOAD_URL="${PACKAGE_REPO}:${PACKAGE_TAG}"
          echo "${DOWNLOAD_URL}"
          echo "download_url=$(echo ${DOWNLOAD_URL})" >> $GITHUB_OUTPUT
        env:
          PACKAGE_TAG: ${{ steps.set-tag-output.outputs.project_version }}
          PACKAGE_REPO: ${{ env.PACKAGE_REPO }}
  submit-deployment-job:
    name: Submit deployment job
    if: |
      always() &&
      ((needs.deploy-pre-release-build.result == 'success' && needs.deploy-release-build.result == 'skipped') ||
      (needs.deploy-pre-release-build.result == 'skipped' && needs.deploy-release-build.result == 'success'))
    needs: [deploy-pre-release-build, deploy-release-build]
    permissions:
      actions: read
      packages: read
      contents: read
    runs-on: ubuntu-latest
    steps:
      # See: https://github.com/bcgov/nr-polaris-pipelines
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0
            fetch-tags: true
            ref: ${{ github.ref }}
      - name: Get deployment approver
        id: get-deployment-approver
        run: |
          set -e
          ENVIRONMENT="${{ inputs.environment }}"
          REPO="${{ github.repository }}"

          # Get environment info from the repo's deployment environments endpoint
          ENV_INFO=$(gh api repos/${REPO}/environments/${ENVIRONMENT})
          REVIEWERS=$(echo "$ENV_INFO" | jq -r '.protection_rules[]? | select(.reviewers != null) | .reviewers[0] // false')
          if [[ -z "$REVIEWERS" ]]; then
            REVIEWERS_REQUIRED=false
          else
            REVIEWERS_REQUIRED=true
          fi

          if [[ "$REVIEWERS_REQUIRED" == "true" ]]; then
            # Reviewers are required, get the approver from approvals endpoint
            RUN_ID="${{ github.run_id }}"
            APPROVALS_JSON=$(gh api repos/${REPO}/actions/runs/${RUN_ID}/approvals)
            APPROVER_ID=$(echo "$APPROVALS_JSON" | jq -r --arg ENVIRONMENT "$ENVIRONMENT" \
              '.[] | select(.environments[]?.name == $ENVIRONMENT) | .user.id // empty')
            if [[ -z "$APPROVER_ID" ]]; then
              echo "No approver found for run ID: $RUN_ID"
              exit 1
            fi
            echo "approver_id=${APPROVER_ID}@GitHub" >> $GITHUB_OUTPUT
          else
            # No reviewers required, use the GitHub actor's user id as the approver
            ACTOR_ID=$(gh api users/${{ github.actor }} | jq -r '.id')
            echo "approver_id=${ACTOR_ID}@GitHub" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Submit deployment job
        id: submit-job
        run: |
          # Record the timestamp in ISO 8601 format
          GH_TASK_START=$(date -u +"%Y-%m-%dT%H:%M:%S.%3NZ")
          echo "gh_task_start=$GH_TASK_START" >> $GITHUB_OUTPUT

          # Require DEPLOYMENT_APPROVER in guid@GitHub format
          if [[ -n "${{ steps.get-deployment-approver.outputs.approver_id }}" ]]; then
            DEPLOYMENT_APPROVER="${{ steps.get-deployment-approver.outputs.approver_id }}"
          else
            echo "Error: No deployment approver found. Failing deployment."
            exit 1
          fi

          DEPLOY_URL="ghcr.io/${{ github.repository }}/deployment-config:${{ inputs.deploy_tag }}"
          TRIGGER_UUID=$(uuidgen)
          echo "trigger_uuid=$TRIGGER_UUID" >> $GITHUB_OUTPUT

          curl \
          --data-urlencode "token=${{ secrets.JENKINS_TOKEN }}" \
          --data-urlencode "githubRunId=${TRIGGER_UUID}" \
          --data-urlencode "githubToken=${{ secrets.GITHUB_TOKEN }}" \
          --data-urlencode "brokerJwt=${{ secrets.<%= brokerJwt %> }}" \
          --data-urlencode "deployUrl=${DEPLOY_URL}" \
          --data-urlencode "deployRoot=<%= deployRoot %>" \
          --data-urlencode "artifactUrl=${DOWNLOAD_URL}" \
          --data-urlencode "artifactSrc=<%= artifactSrc && artifactSrc !== 'repo' ? artifactSrc : 'github' %>" \
          --data-urlencode "artifactSha256=${ARTIFACT_SHA256}" \
          --data-urlencode "projectVersion=${PROJECT_VERSION}" \
          --data-urlencode "envLong=${{ inputs.environment }}" \
          --data-urlencode "triggerUrl=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          --data-urlencode "deploymentApprover=${DEPLOYMENT_APPROVER}" \
          --data-urlencode "intentionId=${BUILD_GUID}" \
          -H "Connection: close" \
          ${{ env.URL }}/${{ env.JOB }}
        env:
          PROJECT_VERSION: ${{ needs.deploy-pre-release-build.outputs.project_version || needs.deploy-release-build.outputs.project_version }}
          BUILD_GUID: ${{ needs.deploy-pre-release-build.outputs.build_guid || needs.deploy-release-build.outputs.build_guid }}
          BUILD_NUMBER: ${{ needs.deploy-pre-release-build.outputs.build_number || needs.deploy-release-build.outputs.build_number }}
          ARTIFACT_SHA256: ${{ needs.deploy-pre-release-build.outputs.artifact_sha256 || needs.deploy-release-build.outputs.artifact_sha256 }}
          DOWNLOAD_URL: ${{ needs.deploy-pre-release-build.outputs.download_url || needs.deploy-release-build.outputs.download_url }}
      - name: Display deployment job URL
        run: |
          DEPLOYMENT_JOB_URL="${{ env.URL }}/job/${{ env.SERVICE_PROJECT }}/job/${{ env.SERVICE_NAME }}/"
          echo "Deployment job URL: ${DEPLOYMENT_JOB_URL}"
      - name: Wait for Jenkins deployment job to be triggered and completed
        id: check-jenkins-job-status
        run: ./.github/workflows/check-deploy-job-status.sh
        env:
          GH_TASK_START: ${{ steps.submit-job.outputs.gh_task_start }}
          BROKER_URL: https://broker.io.nrs.gov.bc.ca
          BROKER_JWT: ${{ secrets.<%= brokerJwt %> }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          TRIGGER_UUID: ${{ steps.submit-job.outputs.trigger_uuid}}
      - name: Generate deploy summary
        if: always()
        run: |
          # Determine the status and appropriate message
          if [[ "${{ steps.check-jenkins-job-status.outcome }}" == "failure" ]]; then
            if [[ -z "${{ steps.check-jenkins-job-status.outputs.event_url }}" ]]; then
              STATUS_MSG="❌ **Failed**: Job was not successfully submitted to Jenkins"
              STATUS_DETAIL="The deployment job could not be triggered. This may indicate a broker connectivity issue."
            else
              STATUS_MSG="❌ **Failed**: Deployment job failed"
              STATUS_DETAIL="The deployment completed but reported a failure status. Check the Jenkins logs for details."
            fi
          elif [[ "${{ steps.check-jenkins-job-status.outcome }}" == "success" && -z "${{ steps.check-jenkins-job-status.outputs.event_url }}" ]]; then
            STATUS_MSG="⚠️ **Timeout**: Job did not complete within 5 minutes"
            STATUS_DETAIL="> **Action Required**: The deployment job is still running in Jenkins. You must manually verify the job status and completion."
          elif [[ "${{ steps.check-jenkins-job-status.outputs.status }}" == "success" ]]; then
            STATUS_MSG="✅ **Success**: Deployment completed successfully"
            STATUS_DETAIL=""
          else
            STATUS_MSG="❌ **Failed**: Deployment did not succeed"
            STATUS_DETAIL="Final status: \`${{ steps.check-jenkins-job-status.outputs.status }}\`"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ${ENVIRONMENT^} Deployment Summary

          | | |
          | - | - |
          | **Ref** | \`${DEPLOY_REF}\` |
          | **Commit** | [${COMMIT_HASH:0:7}](https://github.com/${{ github.repository }}/tree/${COMMIT_HASH}) |
          | **Version** | ${PROJECT_VERSION} |
          | **Artifact SHA256** | ${ARTIFACT_SHA256} |
          | **Deployment Config Tag** | ${DEPLOY_CONFIG_TAG} |
          $(if [[ -n "${{ steps.check-jenkins-job-status.outputs.event_url }}" ]]; then
            echo "| **Job Run** | [View Details](${{ steps.check-jenkins-job-status.outputs.event_url }}) |"
          else
            echo "| **Job Run** | Not available |"
          fi)

          ## Status

          ${STATUS_MSG}

          ${STATUS_DETAIL}

          EOF
        env:
          ENVIRONMENT: ${{ inputs.environment }}
<% if (artifactSrc && artifactSrc !== "repo") { -%>
          DEPLOY_REF: ${{ needs.deploy-pre-release-build.outputs.deploy_ref || github.ref }}
          COMMIT_HASH: ${{ needs.deploy-pre-release-build.outputs.checkout_ref || needs.deploy-release-build.outputs.checkout_ref }}
<% } else { -%>
          DEPLOY_REF: ${{ needs.deploy-pre-release-build.outputs.checkout_ref || github.ref }}
          COMMIT_HASH: ${{ needs.deploy-pre-release-build.outputs.build_version || needs.deploy-release-build.outputs.build_version }}
<% } -%>
          PROJECT_VERSION: ${{ needs.deploy-pre-release-build.outputs.project_version || needs.deploy-release-build.outputs.project_version }}
          ARTIFACT_SHA256: ${{ needs.deploy-pre-release-build.outputs.artifact_sha256 || needs.deploy-release-build.outputs.artifact_sha256 }}
          DEPLOY_CONFIG_TAG: ${{ inputs.deploy_tag }}
<% if (postDeployTestsPath) { -%>
  post-deploy-test:
    name: Post-deploy Test
    permissions: {}
    if: |
      always() &&
      needs.submit-deployment-job.result == 'success'
    needs: submit-deployment-job
    uses: <%= postDeployTestsPath %>
    with:
      environment: ${{ inputs.environment }}
<% } -%>

